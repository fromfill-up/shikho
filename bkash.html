<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>bKash Payment</title>

<style>

body{
  font-family: 'Segoe UI', sans-serif;
  background:#f4f6f9;
  margin:0;
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
  padding:20px;
}

.container{
  width:100%;
  max-width:480px;
  background:white;
  border-radius:16px;
  box-shadow:0 10px 30px rgba(0,0,0,0.08);
  overflow:hidden;
}

/* HEADER */
.header{
  background:#e2136e;
  text-align:center;
  padding:30px 20px;
  color:white;
}

.header img{
  width:90px;
  margin-bottom:12px;
}

.header p{
  margin:0;
  font-weight:700;
  font-size:20px;
}

/* BODY */
.content{
  padding:20px;
}

/* AMOUNT */
.amount-box{
  text-align:center;
  background:#fff0f6;
  padding:16px;
  border-radius:12px;
  margin-bottom:20px;
  font-weight:700;
  color:#e2136e;
}

/* QR FIXED CENTER */
.qr-box{
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  text-align:center;
  margin-bottom:20px;
}

.qr-box img{
  width:170px;
  height:170px;
  object-fit:contain;
  padding:10px;
  border:1px solid #eee;
  border-radius:12px;
  background:white;
  display:block;
}

.qr-box p{
  margin-top:10px;
  font-size:14px;
  color:#666;
}

/* INSTRUCTIONS */
.instructions{
  font-size:14px;
  margin-bottom:20px;
}

.instructions ol{
  padding-left:18px;
}

label{
  font-size:14px;
  font-weight:600;
  display:block;
  margin-top:10px;
}

input{
  width:100%;
  padding:12px;
  margin-top:6px;
  border:1px solid #ddd;
  border-radius:8px;
  outline:none;
}

input:focus{
  border-color:#e2136e;
}

/* BUTTON */
button{
  width:100%;
  padding:14px;
  margin-top:18px;
  background:#e2136e;
  border:none;
  color:white;
  font-size:16px;
  font-weight:700;
  border-radius:10px;
  cursor:pointer;
}

/* SUCCESS SCREEN */
.success-screen{
  position:fixed;
  inset:0;
  background:white;
  display:none;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
  padding:20px;
}

/* LOADER */
.loader{
  width:55px;
  height:55px;
  border:5px solid #f3f3f3;
  border-top:5px solid #e2136e;
  border-radius:50%;
  animation:spin 1s linear infinite;
}

@keyframes spin{
  100%{ transform:rotate(360deg); }
}

/* CHECKMARK */
.checkmark{
  width:90px;
  height:90px;
  stroke:#22c55e;
  stroke-width:4;
  fill:none;
  stroke-dasharray:200;
  stroke-dashoffset:200;
  animation:draw 1s forwards;
}

@keyframes draw{
  to{ stroke-dashoffset:0; }
}

.success-text{
  margin-top:20px;
  font-size:16px;
  color:#333;
  font-weight:600;
}

</style>
</head>

<body>

<div class="container" id="mainContent">

  <div class="header">
    <img src="bkash-logo.png" alt="bKash">
    <p>Administrative Fee</p>
  </div>

  <div class="content">

    <div class="amount-box">
      Amount: 300 BDT
    </div>

    <div class="qr-box">
      <img src="OR.jpeg" alt="QR Code">
      <p>Scan & Pay using bKash</p>
    </div>

    <div class="instructions">
      <strong>Instructions:</strong>
      <ol>
        <li>Open bKash App</li>
        <li>Tap Send Money</li>
        <li>Send to: <b>01961398298</b></li>
        <li>Amount: <b>300 BDT</b></li>
        <li>Submit Transaction ID below</li>
      </ol>
    </div>

    <form id="paymentForm">

      <label>bKash Number</label>
      <input type="text" required>

      <label>Transaction ID</label>
      <input type="text" required>

      <label>Payment Proof</label>
      <input type="file" required>

      <button type="submit">Submit Payment</button>

    </form>

  </div>
</div>

<!-- SUCCESS -->
<div class="success-screen" id="successScreen">

  <div class="loader" id="loader"></div>

  <div id="successContent" style="display:none;">

    <svg class="checkmark" viewBox="0 0 52 52">
      <path d="M14 27 L22 35 L38 18"/>
    </svg>

    <div class="success-text">
      Payment submitted successfully.<br>
      We will verify it shortly.
    </div>

  </div>

</div>

<script>

const form = document.getElementById('paymentForm');
const successScreen = document.getElementById('successScreen');
const loader = document.getElementById('loader');
const successContent = document.getElementById('successContent');

form.addEventListener('submit', function(e){
  e.preventDefault();

  successScreen.style.display = 'flex';

  loader.style.display = 'block';
  successContent.style.display = 'none';

  setTimeout(()=>{
    loader.style.display = 'none';
    successContent.style.display = 'block';
  },2000);
});

</script>

</body>
</html>
